<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - نظام تي ركس</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .error-message {
            color: red;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>تسجيل دخول الطلاب</h2>
    <form id="loginForm">
        <div class="form-group">
            <label for="email">البريد الإلكتروني:</label>
            <input type="email" id="email" required>
        </div>
        <div class="form-group">
            <label for="password">كلمة المرور:</label>
            <input type="password" id="password" required>
        </div>
        <button type="submit">دخول</button>
        <div id="errorMessage" class="error-message"></div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // إعدادات الاتصال بمنصة سوبابيز الخاصة بمشروعك
    // حط الرابط بتاع مشروعك ومفتاح الأنون الحقيقيين هنا مكان النصوص دي
    const supabaseUrl = 'https://your-project-id.supabase.co';
    const supabaseKey = 'your-anon-key-here';
    
    // بناء وتشغيل عميل سوبابيز
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    // الإمساك بعناصر الواجهة البصرية
    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const errorMessage = document.getElementById('errorMessage');

    // مراقبة حدث إرسال البيانات من الفورم
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault(); // منع الصفحة من إعادة التحميل الافتراضية
        
        errorMessage.style.display = 'none';
        errorMessage.innerText = '';

        const email = emailInput.value;
        const password = passwordInput.value;

        // تنفيذ عملية التوثيق والتحقق من الحساب من خلال سوبابيز
        const { data, error } = await supabase.auth.signInWithPassword({
            email: email,
            password: password,
        });

        if (error) {
            // في حالة وجود خطأ في البيانات أو الشبكة يظهر للمستخدم فوراً
            errorMessage.innerText = 'خطأ في تسجيل الدخول: ' + error.message;
            errorMessage.style.display = 'block';
        } else {
            // في حالة النجاح، الانتقال الفوري لصفحة بنوك الأسئلة والملخصات
            window.location.href = 'questions.html';
        }
    });
</script>
</body>
</html>
